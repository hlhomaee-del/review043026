<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CBCS Sprint</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

.container{
  width:90%;
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* NAV */
.nav button{
  padding:10px 15px;
  border:none;
  border-radius:20px;
  margin-right:10px;
  cursor:pointer;
}
.active{
  background:#22d3ee;
  color:black;
}

/* PAGES */
.page{display:none}
.page.active{display:block}

/* FLASHCARDS */
.card{
  background:#1a2238;
  padding:20px;
  margin:10px;
  border-radius:15px;
  display:inline-block;
  cursor:pointer;
}

/* PARTNER */
.partner-box{
  background:#12192e;
  padding:15px;
  margin-top:10px;
  border-radius:10px;
}

/* PRACTICE LAYOUT */
.practice{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.left,.right{
  flex:1;
  min-width:300px;
  background:#12192e;
  padding:20px;
  border-radius:15px;
}

/* QUESTION */
.question{
  color:gold;
  font-size:20px;
  font-weight:bold;
}

/* ANSWERS */
.answer{
  margin-top:10px;
  padding:15px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  width:100%;
  font-weight:bold;
}

/* COLORS */
.a{background:#f472b6}
.b{background:#60a5fa}
.c{background:#facc15}
.d{background:#34d399}

/* CORRECT GLOW */
.correct-choice{
  border:3px solid #00ff99;
  animation:glow 1s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 10px #00ff99;}
  to{box-shadow:0 0 30px #00ff99;}
}

/* WRONG FADE */
.wrong-choice{
  border:3px solid red;
  animation:fadeRed 1s forwards;
}

@keyframes fadeRed{
  0%{box-shadow:0 0 25px red;}
  100%{box-shadow:0 0 0px transparent;}
}

/* CONFETTI */
#confetti div{
  position:fixed;
  width:8px;
  height:8px;
  top:0;
  animation:fall 1s linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(100vh) rotate(360deg);
    opacity:0;
  }
}

/* NEXT BUTTON */
.next{
  margin-top:20px;
  padding:15px;
  background:gold;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="nav">
<button onclick="showPage(1)" id="b1" class="active">Concept</button>
<button onclick="showPage(2)" id="b2">Practice</button>
</div>

<div class="container">

<!-- PAGE 1 -->
<div id="page1" class="page active">
<h2>Concept Sprint</h2>

<div class="card">SOAP</div>
<div class="card">ICD</div>
<div class="card">CPT</div>
<div class="card">Medical Necessity</div>

<div class="partner-box">
<b>When do you code symptoms?</b><br><br>
Answer, then reveal:
<br><br>
<button onclick="this.nextElementSibling.style.display='block'">Reveal</button>
<div style="display:none;color:#22d3ee;margin-top:10px">
When no diagnosis is confirmed or when symptoms are not explained.
</div>
</div>

</div>

<!-- PAGE 2 -->
<div id="page2" class="page">

<h2>Practice Questions</h2>
<p>Read the scenario carefully. Read the question. Choose the best answer.</p>

<div class="practice">

<div class="left">
<div id="scenario"></div>
<h3 class="question" id="question"></h3>

<div id="answers"></div>

<button class="next" id="nextBtn" onclick="nextQ()" disabled>Next Question</button>
</div>

<div class="right" id="rationale">
Your rationale will appear here.
</div>

</div>

</div>

</div>

<div id="confetti"></div>

<script>

/* NAV */
function showPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'))
  document.getElementById('page'+n).classList.add('active')
}

/* QUESTIONS */
let index=0

const questions=[
{
scenario:"Patient with knee pain after fall.",
q:"Which coding is correct?",
options:["Code fracture","Code knee pain","Code screening","Wait for result"],
correct:1,
r:"Symptoms are coded when diagnosis is not confirmed."
},
{
scenario:"Insurance card review.",
q:"Which is most important?",
options:["RxBIN","Group","Member ID","Copay"],
correct:2,
r:"Member ID identifies the patient."
},
{
scenario:"Diabetes visit with exam.",
q:"What must be verified?",
options:["Diagnosis supports service","Change code","Delay claim","Remove symptoms"],
correct:0,
r:"Diagnosis must support medical necessity."
},
{
scenario:"Deductible met, 20% coinsurance.",
q:"Patient pays?",
options:["$200","$40","$0","Copay"],
correct:1,
r:"20% of $200 = $40."
},
{
scenario:"Hospital and physician billing.",
q:"Correct action?",
options:["Bill together","Delay","Separate billing","Combine codes"],
correct:2,
r:"Professional and facility billing must be separate."
}
]

function loadQ(){
  let q=questions[index]

  document.getElementById('scenario').innerText=q.scenario
  document.getElementById('question').innerText=q.q

  let ans=document.getElementById('answers')
  ans.innerHTML=""

  ["a","b","c","d"].forEach((cls,i)=>{
    let btn=document.createElement('button')
    btn.className="answer "+cls
    btn.innerText=q.options[i]
    btn.onclick=()=>selectAnswer(i,btn)
    ans.appendChild(btn)
  })

  document.getElementById('nextBtn').disabled=true
}

function selectAnswer(i,btn){
  let q=questions[index]

  let buttons=document.querySelectorAll('.answer')

  buttons.forEach((b,idx)=>{
    b.disabled=true

    if(idx===q.correct){
      b.classList.add("correct-choice")
    }

    if(idx===i && i!==q.correct){
      b.classList.add("wrong-choice")
    }
  })

  if(i===q.correct){
    launchConfetti()
  }

  document.getElementById('rationale').innerText=q.r
  document.getElementById('nextBtn').disabled=false
}

/* CONFETTI */
function launchConfetti(){
  let container=document.getElementById('confetti')

  for(let i=0;i<30;i++){
    let c=document.createElement('div')
    c.style.left=Math.random()*100+"%"
    c.style.background=`hsl(${Math.random()*360},100%,50%)`
    container.appendChild(c)

    setTimeout(()=>c.remove(),1000)
  }
}

/* NEXT */
function nextQ(){
  index++
  if(index>=questions.length){
    document.getElementById('rationale').innerText="Done."
    return
  }
  loadQ()
}

loadQ()

</script>

</body>
</html>
